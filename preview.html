<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Jeeves</title>


<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#2c3e50,#4ca1af);

    display:flex;
    justify-content:center;
    align-items:flex-start;

    min-height:100vh;
    padding-top:90px;
}

/* Card */

.container{
    text-align:center;
    background:white;
    padding:40px 35px;
    border-radius:16px;

    width:92%;
    max-width:380px;

    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

/* Text */

h1{
    margin-bottom:10px;
    color:#222;
    font-size:24px;
}

p{
    margin-bottom:30px;
    color:#666;
    font-size:14px;
}

/* Buttons */

.btn{
    display:block;
    width:100%;
    padding:16px;
    margin:14px 0;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
    text-align:center;
    transition:0.2s;
}

.android{
    background:#34C759;
    color:white;
}

.ios{
    background:#000;
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
}

/* Mobile optimization */

@media (max-width:480px){

    body{
        padding-top:70px;
    }

    .container{
        max-width:420px;
        padding:45px 35px;
    }

    .btn{
        padding:18px;
        font-size:17px;
    }

}

</style>
    
</head>

<body>

<div class="container">

<h1>Download JEEVES Home</h1>
<p>Select your device</p>

<a class="btn android" href="https://play.google.com/store/apps/details?id=com.onesecai.jeeves">
Download for Android
</a>

<a class="btn ios" href="https://apps.apple.com/ph/app/jeeves-home/id1346509576">
Download for iOS
</a>

</div>

</body>
</html>
