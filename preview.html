<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Jeeves</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#2c3e50,#4ca1af);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

/* Card */

.container{
    text-align:center;
    background:white;
    padding:35px 30px;
    border-radius:14px;
    width:90%;
    max-width:340px;
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* Text */

h1{
    margin-bottom:10px;
    color:#222;
}

p{
    margin-bottom:30px;
    color:#666;
}

/* Buttons */

.btn{
    display:block;
    width:100%;
    padding:15px;
    margin:12px 0;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    text-align:center;
    transition:0.25s;
}

.android{
    background:#34C759;
    color:white;
}

.ios{
    background:#000000;
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
}

/* Mobile */

@media (max-width:480px){

    body{
        padding:20px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>Download JEEVES Home</h1>
<p>Select your device</p>

<a class="btn android" href="https://play.google.com/store/apps/details?id=com.onesecai.jeeves">
Download for Android
</a>

<a class="btn ios" href="https://apps.apple.com/ph/app/jeeves-home/id1346509576">
Download for iOS
</a>

</div>

</body>
</html>
